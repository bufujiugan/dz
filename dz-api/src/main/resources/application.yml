server:
  port: 8080

spring:
  application:
    name: dz-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/dz?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      transaction-isolation: TRANSACTION_READ_COMMITTED
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
      encoding: UTF-8
      continue-on-error: false
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

security:
  jwt:
    secret: ${JWT_SECRET}

wechat:
  mock-enabled: ${WECHAT_MOCK_ENABLED:true}
  auth-mock-enabled: ${WECHAT_AUTH_MOCK_ENABLED:true}
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
  mch-id: ${WECHAT_MCH_ID:}
  merchant-private-key-path: ${WECHAT_MERCHANT_PRIVATE_KEY_PATH:}
  merchant-serial-number: ${WECHAT_MERCHANT_SERIAL_NUMBER:}
  api-v3-key: ${WECHAT_API_V3_KEY:}

storage:
  local:
    root: ${UPLOAD_ROOT:F:/works/dz/uploads}
    public-prefix: /uploads

springdoc:
  swagger-ui:
    path: /swagger-ui.html
