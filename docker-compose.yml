services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: dz
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - dz_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DB_URL: jdbc:mysql://mysql:3306/dz?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      WECHAT_MOCK_ENABLED: "true"
      WECHAT_AUTH_MOCK_ENABLED: ${WECHAT_AUTH_MOCK_ENABLED:-true}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      UPLOAD_ROOT: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - dz_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    environment:
      DB_URL: jdbc:mysql://mysql:3306/dz?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      WECHAT_MOCK_ENABLED: "true"
      WECHAT_AUTH_MOCK_ENABLED: ${WECHAT_AUTH_MOCK_ENABLED:-true}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  dz_mysql_data:
  dz_uploads:
